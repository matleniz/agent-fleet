name: CI

# Lint + test on every push to main and every PR. Nothing here is a runtime
# dependency of the tools: shellcheck/ruff run only in CI, and the test suite is
# the repo's own hand-rolled bash scripts (test/*.sh), which already exit non-zero
# on failure. Keeps the one real risk — bin/ ↔ docs drift and shell/py bugs — in
# check without adding anything the tools depend on.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning   # style/info are advisory only; warnings+ gate (see .shellcheckrc)

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4.1.0   # self-installs ruff; reads ruff.toml (incl. bin/fleet-assess)

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tmux (needed by the dispatch/barrier E2E layers)
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Git identity (make-sandbox commits a seed repo)
        run: |
          git config --global user.email ci@agent-fleet.invalid
          git config --global user.name  "agent-fleet CI"
      - name: Run the test suite
        run: |
          set -euo pipefail
          for t in test/test-context.sh test/test-guard.sh test/global.sh \
                   test/dispatch.sh test/barrier-cursor.sh; do
            echo "::group::$t"
            bash "$t"
            echo "::endgroup::"
          done
          for p in antigravity copilot; do
            echo "::group::barrier-mount-ns $p"
            bash test/barrier-mount-ns.sh "$p"
            echo "::endgroup::"
          done
